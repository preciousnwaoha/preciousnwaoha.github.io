<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Blog | {{SITE_NAME}}</title>
  <meta name="description" content="{{BLOG_DESCRIPTION}}" />
  <link rel="canonical" href="{{BLOG_URL}}" />

  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Blog | {{SITE_NAME}}" />
  <meta property="og:description" content="{{BLOG_DESCRIPTION}}" />
  <meta property="og:url"         content="{{BLOG_URL}}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" /></noscript>
  <link rel="stylesheet" href="/assets/css/style.css" />

  <script>
    (function(){
      try { if(localStorage.getItem('theme')==='light') document.body.classList.add('light'); } catch(e){}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav-logo">Precious N.</a>
      <div class="site-nav-links">
        <a href="/blog/" class="active"><span>Posts</span></a>
        <a href="/#about"><span>About</span></a>
        <a href="/#portfolio"><span>Work</span></a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
      </div>
    </nav>
  </header>

  <main class="blog-index">
    <section class="blog-intro">
      <p class="post-kicker">Writing</p>
      <h1>Blog</h1>
      <p>{{BLOG_DESCRIPTION}}</p>
    </section>

    <section class="post-grid">
      {{POSTS_HTML}}
    </section>
  </main>

  <script>
    const btn  = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      icon.className = light ? 'fas fa-sun' : 'fas fa-moon';
      try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch(e){}
    }
    applyTheme(document.body.classList.contains('light'));
    btn.addEventListener('click', () => applyTheme(!document.body.classList.contains('light')));
  </script>
</body>
</html>
