<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{TITLE}} | {{SITE_NAME}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="canonical" href="{{CANONICAL}}" />

  <meta property="og:type"        content="article" />
  <meta property="og:title"       content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:url"         content="{{CANONICAL}}" />
  <meta property="og:site_name"   content="{{SITE_NAME}}" />
  {{OG_IMAGE_TAG}}

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@takaraqode" />
  <meta name="twitter:title"       content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />
  {{TWITTER_IMAGE_TAG}}

  <script type="application/ld+json">
{{JSON_LD}}
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" /></noscript>
  <link rel="stylesheet" href="/assets/css/style.css" />

  <script>
    // Apply saved theme before paint to avoid flash
    (function(){
      try { if(localStorage.getItem('theme')==='light') document.body.classList.add('light'); } catch(e){}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="site-nav-logo">Precious N.</a>
      <div class="site-nav-links">
        <a href="/blog/"><span>Posts</span></a>
        <a href="/#about"><span>About</span></a>
        <a href="/#portfolio"><span>Work</span></a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
      </div>
    </nav>
  </header>

  <main class="blog-page">
    <article class="post">
      <header class="post-header">
        <p class="post-kicker">Blog</p>
        <h1 class="post-title">{{TITLE}}</h1>
        <div class="post-meta">
          <i class="fas fa-calendar-alt"></i>
          <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
          {{UPDATED_DISPLAY}}
          {{READTIME_DISPLAY}}
        </div>
        {{TAGS_HTML}}
      </header>

      {{COVER_HTML}}

      {{VIDEO_HTML}}

      <section class="post-content">
        {{CONTENT}}
      </section>

      <footer class="post-footer">
        <a href="/blog/"><i class="fas fa-arrow-left"></i> All Posts</a>
        <div class="post-footer-socials">
          <a href="https://github.com/preciousnwaoha" target="_blank" rel="noreferrer" title="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://x.com/takaraqode" target="_blank" rel="noreferrer" title="X / Twitter"><i class="fab fa-twitter"></i></a>
          <a href="https://youtube.com/@preciousnwaoha" target="_blank" rel="noreferrer" title="YouTube"><i class="fab fa-youtube"></i></a>
        </div>
      </footer>
    </article>
  </main>

  <script>
    // Theme toggle
    const btn  = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-icon');
    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      icon.className = light ? 'fas fa-sun' : 'fas fa-moon';
      try { localStorage.setItem('theme', light ? 'light' : 'dark'); } catch(e){}
    }
    // Sync icon with current state
    applyTheme(document.body.classList.contains('light'));
    btn.addEventListener('click', () => applyTheme(!document.body.classList.contains('light')));
  </script>
</body>
</html>
